<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>서울 10개구 숙박시설 3D</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#map{width:100%;height:100%;font-family:'Segoe UI',sans-serif}
#panel{position:fixed;top:16px;left:16px;background:rgba(8,8,20,.94);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:14px 16px;color:#ddd;font-size:13px;z-index:100;min-width:230px}
#panel h3{color:#ffb432;font-size:14px;font-weight:700;margin-bottom:10px}
.stat{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.val{color:#fff;font-weight:600}
.hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:9px 0}
.sl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.mbtns{display:flex;gap:5px;flex-wrap:wrap}
.mb{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);color:#aaa;font-size:11px;cursor:pointer}
.mb.on{background:rgba(255,180,50,.2);border-color:#ffb432;color:#ffb432;font-weight:700}
.tg{display:flex;align-items:center;gap:8px;margin-top:7px;cursor:pointer;color:#bbb;font-size:12px}
.tg input{accent-color:#ffb432}
#legend{position:fixed;bottom:20px;right:16px;background:rgba(8,8,20,.94);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 16px;color:#ccc;font-size:12px;z-index:100;min-width:210px;max-height:80vh;overflow-y:auto}
#lgt{color:#ffb432;font-weight:700;margin-bottom:8px}
.lr{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.ls{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.lsci{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.5)}
#tip{position:fixed;pointer-events:none;background:rgba(8,8,20,.97);border:1px solid rgba(255,180,50,.5);border-radius:8px;padding:10px 13px;font-size:12px;z-index:100;display:none;min-width:190px;color:#eee}
.tgu{font-size:10px;color:#888;margin-bottom:2px}
.tnm{font-size:13px;font-weight:700;color:#ffb432;margin-bottom:6px}
.tr{display:flex;justify-content:space-between;gap:12px;margin-bottom:3px}
.tv{color:#fff;font-weight:600}
.tfi{margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,100,30,.3);font-size:11px;font-weight:700}
#load{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(8,8,20,.97);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:20px 32px;color:#ddd;font-size:14px;z-index:200;text-align:center}
#guide{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(8,8,20,.85);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:5px 16px;color:#555;font-size:11px;z-index:100;white-space:nowrap}
#fstip{position:fixed;pointer-events:none;background:rgba(8,8,20,.97);border:1px solid rgba(255,80,80,.5);border-radius:8px;padding:8px 12px;font-size:12px;z-index:101;display:none;color:#eee;min-width:140px}
</style>
</head>
<body>
<div id="map"></div>
<div id="load">⏳ 데이터 로딩 중...</div>
<div id="panel">
  <h3>🏙 10개구 숙박시설 3D</h3>
  <div class="stat"><span>분석 대상 구</span><span class="val">10개구</span></div>
  <div class="stat"><span>숙박있는 집계구</span><span class="val" id="st-cnt">-</span></div>
  <div class="stat"><span>평균 건축연령</span><span class="val" id="st-age">-</span></div>
  <hr class="hr">
  <div class="sl">높이 기준</div>
  <div class="mbtns" id="hb">
    <button class="mb on" onclick="setH(this,'floors')">평균 층수</button>
    <button class="mb" onclick="setH(this,'count')">숙박시설 수</button>
    <button class="mb" onclick="setH(this,'fire')">화재위험도</button>
  </div>
  <hr class="hr">
  <div class="sl">색상 기준</div>
  <div class="mbtns" id="cb">
    <button class="mb on" onclick="setC(this,'age')">노후도</button>
    <button class="mb" onclick="setC(this,'fire')">화재위험</button>
    <button class="mb" onclick="setC(this,'count')">숙박밀집</button>
  </div>
  <hr class="hr">
  <label class="tg"><input type="checkbox" id="ce" checked onchange="toggleE()"> 빈 집계구 표시</label>
  <label class="tg"><input type="checkbox" id="fsv" checked onchange="toggleFS()"> 소방서/안전센터</label>
</div>
<div id="legend">
  <div id="lgt"></div>
  <div id="lgi"></div>
  <div id="lgn" style="font-size:10px;color:#555;margin-top:6px"></div>
  <hr style="border:none;border-top:1px solid rgba(255,255,255,.08);margin:9px 0">
  <div style="color:#ff8080;font-weight:700;margin-bottom:6px">소방 시설</div>
  <div class="lr"><div class="lsci" style="background:#ff3030"></div><span>소방서 (본서)</span></div>
  <div class="lr"><div class="lsci" style="background:#ff9900;width:9px;height:9px"></div><span>안전센터</span></div>
</div>
<div id="tip">
  <div class="tgu" id="tgu"></div><div class="tnm" id="tnm"></div>
  <div class="tr"><span>숙박시설 수</span><span class="tv" id="tcnt"></span></div>
  <div class="tr"><span>평균 층수</span><span class="tv" id="tfl"></span></div>
  <div class="tr"><span>평균 건축연령</span><span class="tv" id="tage"></span></div>
  <div class="tr"><span>숙박 비율</span><span class="tv" id="trat"></span></div>
  <div class="tfi" id="tfire"></div>
</div>
<div id="fstip"></div>
<div id="guide">🖱 드래그: 이동 | Ctrl+드래그 또는 우클릭드래그: 회전/기울기 | 스크롤: 줌</div>
<script>
var GU=['강남구','서초구','송파구','영등포구','강동구','강서구','중구','종로구','마포구','용산구'];
var guf=['in',['get','gu'],['literal',GU]];
var hM='floors', cM='age', rdy=false;
var C={
  age:{t:'노후도 (평균 건축연령)',
    s:[[0,'#d4eeff'],[10,'#78c878'],[20,'#ffe066'],[30,'#ff8c00'],[40,'#e03000'],[50,'#a00000'],[65,'#5a0020']],
    l:['0~10년 신축','10~20년 양호','20~30년 보통','30~40년 ⚠ 노후','40~50년 ⚠ 위험','50~65년 🔴 매우위험','65년+ 🔴 극위험']},
  fire:{t:'화재위험도 점수',
    s:[[0,'#50c878'],[25,'#fcc419'],[45,'#ff7a00'],[65,'#e03030'],[80,'#8b0000']],
    l:['0~25 낮음','25~45 보통','45~65 높음','65~80 매우높음','80+ 극위험']},
  count:{t:'숙박시설 수',
    s:[[1,'#2a4090'],[3,'#3070c0'],[6,'#60b040'],[10,'#f0a020'],[20,'#e03010'],[40,'#9b0000']],
    l:['1개','2~3개','4~6개','7~10개','11~20개','21개+']}
};
var HN={floors:'높이 = 평균층수 × 28m',count:'높이 = 숙박시설수 × 15m',fire:'높이 = 화재위험도 × 12m'};
function hE(){
  if(hM==='floors') return ['*',['max',['get','fl'],1],28];
  if(hM==='count')  return ['*',['max',['get','cnt'],1],15];
  return ['*',['max',['get','fire'],1],12];
}
function cE(){
  var f=cM==='age'?'age':cM==='fire'?'fire':'cnt';
  var e=['interpolate',['linear'],['get',f]];
  C[cM].s.forEach(function(x){e.push(x[0],x[1]);});
  return e;
}
function rLeg(){
  var m=C[cM];
  document.getElementById('lgt').textContent=m.t;
  var h='';
  m.s.forEach(function(x,i){
    h+='<div class="lr"><div class="ls" style="background:'+x[1]+'"></div><span>'+(m.l[i]||x[0])+'</span></div>';
  });
  document.getElementById('lgi').innerHTML=h;
  document.getElementById('lgn').textContent=HN[hM];
}
var map=new maplibregl.Map({
  container:'map',
  style:{version:8,
    glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources:{ct:{type:'raster',
      tiles:['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
             'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'],
      tileSize:256,attribution:'CARTO'}},
    layers:[{id:'bg',type:'raster',source:'ct'}]},
  center:[126.990,37.530],zoom:11.5,pitch:55,bearing:-15,antialias:true
});
map.addControl(new maplibregl.NavigationControl(),'top-right');
map.on('load',function(){
  document.getElementById('load').textContent='📦 집계구 데이터 로딩 중...';
  fetch('data/oa_3d.json')
    .then(function(r){return r.json();})
    .then(function(data){
      document.getElementById('load').textContent='🚒 소방서 데이터 로딩 중...';
      // 10개구 통계 계산
      var feats=data.features.filter(function(f){return GU.indexOf(f.properties.gu)>=0;});
      var nonzero=feats.filter(function(f){return f.properties.cnt>0;});
      var ages=nonzero.map(function(f){return +f.properties.age||0;}).filter(function(v){return v>0;});
      var avgAge=ages.length?ages.reduce(function(a,b){return a+b;},0)/ages.length:0;
      document.getElementById('st-cnt').textContent=nonzero.length.toLocaleString()+'개';
      document.getElementById('st-age').textContent=avgAge.toFixed(1)+'년';

      map.addSource('oa',{type:'geojson',data:data});
      map.addLayer({id:'ef',type:'fill',source:'oa',
        filter:['all',['==',['get','cnt'],0],guf],
        paint:{'fill-color':'#1a1a30','fill-opacity':0.55}});
      map.addLayer({id:'el',type:'line',source:'oa',
        filter:['all',['==',['get','cnt'],0],guf],
        paint:{'line-color':'#3a3a55','line-width':0.4}});
      map.addLayer({id:'o3',type:'fill-extrusion',source:'oa',
        filter:['all',['>',['get','cnt'],0],guf],
        paint:{'fill-extrusion-color':cE(),'fill-extrusion-height':hE(),
               'fill-extrusion-base':0,'fill-extrusion-opacity':0.85}});
      rdy=true; rLeg();
      return fetch('data/firestation_data.json');
    })
    .then(function(r){return r.json();})
    .then(function(stations){
      document.getElementById('load').style.display='none';
      var fsGeo={type:'FeatureCollection',features:stations.map(function(s){
        return {type:'Feature',
          geometry:{type:'Point',coordinates:[s.lng,s.lat]},
          properties:{name:(s.name||'').trim(),type:s.type,count:s.count}};
      })};
      map.addSource('fs',{type:'geojson',data:fsGeo});
      // 안전센터 (작은 원)
      map.addLayer({id:'fsc2',type:'circle',source:'fs',
        filter:['==',['get','type'],'안전센터'],
        paint:{'circle-radius':6,'circle-color':'#ff9900',
               'circle-stroke-color':'rgba(255,255,255,.7)','circle-stroke-width':1.5,
               'circle-opacity':0.9}});
      // 소방서 (큰 원)
      map.addLayer({id:'fsc1',type:'circle',source:'fs',
        filter:['==',['get','type'],'소방서'],
        paint:{'circle-radius':10,'circle-color':'#ff2020',
               'circle-stroke-color':'#fff','circle-stroke-width':2.5,
               'circle-opacity':0.95}});
      // 소방서 이름 라벨
      map.addLayer({id:'fsl1',type:'symbol',source:'fs',
        filter:['==',['get','type'],'소방서'],
        layout:{'text-field':['get','name'],'text-size':11,
                'text-offset':[0,1.4],'text-anchor':'top','text-allow-overlap':false},
        paint:{'text-color':'#ffcccc','text-halo-color':'rgba(0,0,0,.9)','text-halo-width':1.5}});
    })
    .catch(function(e){
      document.getElementById('load').style.display='none';
      console.error(e);
    });
});
// 집계구 툴팁
map.on('mousemove','o3',function(e){
  map.getCanvas().style.cursor='pointer';
  var p=e.features[0].properties;
  var t=document.getElementById('tip');
  t.style.display='block';
  t.style.left=(e.point.x+16)+'px';
  t.style.top=Math.max(10,e.point.y-200)+'px';
  document.getElementById('tgu').textContent=p.gu||'';
  document.getElementById('tnm').textContent='집계구 #'+(p.no||String(p.id).slice(8));
  document.getElementById('tcnt').textContent=p.cnt+' 개';
  document.getElementById('tfl').textContent=(+p.fl||0).toFixed(1)+' 층';
  document.getElementById('tage').textContent=(+p.age||0).toFixed(1)+' 년';
  document.getElementById('trat').textContent=(+p.rat||0).toFixed(1)+' %';
  var f=+p.fire||0;
  var lv=f>=80?'극위험':f>=65?'매우높음':f>=45?'높음':f>=25?'보통':'낮음';
  var fc=f>=80?'#ff2020':f>=65?'#e03030':f>=45?'#ff7a00':f>=25?'#fcc419':'#50c878';
  document.getElementById('tfire').style.color=fc;
  document.getElementById('tfire').textContent='🔥 화재위험도 '+f.toFixed(0)+'점 ('+lv+')';
  document.getElementById('fstip').style.display='none';
});
map.on('mouseleave','o3',function(){
  map.getCanvas().style.cursor='';
  document.getElementById('tip').style.display='none';
});
// 소방서 툴팁
['fsc1','fsc2'].forEach(function(lid){
  map.on('mousemove',lid,function(e){
    map.getCanvas().style.cursor='pointer';
    var p=e.features[0].properties;
    var t=document.getElementById('fstip');
    var isFire=p.type==='소방서';
    t.style.display='block';
    t.style.left=(e.point.x+14)+'px';
    t.style.top=(e.point.y-50)+'px';
    t.style.borderColor=isFire?'rgba(255,50,50,.7)':'rgba(255,150,0,.7)';
    t.innerHTML='<div style="font-size:10px;color:'+(isFire?'#ff8080':'#ffbb66')+';margin-bottom:3px">'+(isFire?'🚒 소방서 (본서)':'🧯 안전센터')+'</div>'
      +'<div style="font-weight:700;color:#fff">'+(p.name||'(이름없음)')+'</div>';
    document.getElementById('tip').style.display='none';
  });
  map.on('mouseleave',lid,function(){
    map.getCanvas().style.cursor='';
    document.getElementById('fstip').style.display='none';
  });
});
function setH(btn,mode){
  hM=mode;
  document.querySelectorAll('#hb .mb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  if(rdy) map.setPaintProperty('o3','fill-extrusion-height',hE());
  rLeg();
}
function setC(btn,mode){
  cM=mode;
  document.querySelectorAll('#cb .mb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  if(rdy) map.setPaintProperty('o3','fill-extrusion-color',cE());
  rLeg();
}
function toggleE(){
  if(!rdy) return;
  var v=document.getElementById('ce').checked?'visible':'none';
  map.setLayoutProperty('ef','visibility',v);
  map.setLayoutProperty('el','visibility',v);
}
function toggleFS(){
  var v=document.getElementById('fsv').checked?'visible':'none';
  ['fsc1','fsc2','fsl1'].forEach(function(lid){
    if(map.getLayer(lid)) map.setLayoutProperty(lid,'visibility',v);
  });
}
rLeg();
</script>
</body>
</html>
